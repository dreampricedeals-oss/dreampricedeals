<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trouvez votre produit</title>
<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:60px;
}
h1{font-size:38px;}
input{
padding:12px;
font-size:18px;
width:240px;
margin-top:20px;
}
button{
padding:12px 25px;
font-size:18px;
background:black;
color:white;
border:none;
cursor:pointer;
margin-top:15px;
}
img{
margin-top:20px;
max-width:260px;
}
</style>
</head>

<body>

<h1>Trouvez votre produit</h1>
<p>Saisissez le numéro de produit indiqué dans la vidéo.</p>

<input id="productInput" placeholder="Exemple : 101">
<br>
<button onclick="findProduct()">Trouver un produit</button>

<div id="result"></div>

<script>

// URL publiée (TSV)
const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS2LR2-q7e-c2xs1tfhj7j3c7m2GIEorJSralJYjSlmXLg_ZdxVqZNrJClYcgNwYnTwxSqdkFLHHobG/pub?output=tsv";

async function findProduct(){

const input = document.getElementById("productInput").value.trim();

const res = await fetch(sheetURL);
const text = await res.text();

// nettoyer les lignes
const rows = text.split("\n").map(r => r.trim()).filter(r => r.length>0).slice(1);

for (let row of rows){

// séparer par tabulation
const cols = row.split("\t").map(c => c.trim());

const id = cols[0];
const name = cols[1];
const image = cols[2];
const link = cols[3];

if(id === input){

document.getElementById("result").innerHTML = `
<h2>${name}</h2>
<img src="${image}">
<br><br>
<a href="${link}" target="_blank">
<button>Acheter le produit</button>
</a>
`;

return;
}

}

document.getElementById("result").innerHTML = "Produit introuvable";

}

</script>

</body>
</html>
