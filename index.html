<!DOCTYPE html>
<html>

<head>

<title>Find Your Product</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:60px;
}

h1{
font-size:38px;
}

input{
padding:12px;
font-size:18px;
width:240px;
margin-top:20px;
}

button{
padding:12px 25px;
font-size:18px;
background:black;
color:white;
border:none;
cursor:pointer;
margin-top:15px;
}

img{
margin-top:20px;
max-width:250px;
}

</style>

</head>


<body>

<h1>Find Your Product</h1>

<p>Enter the product number from the video</p>

<input id="productInput" placeholder="Example: 101">

<br>

<button onclick="findProduct()">Find Product</button>

<div id="result"></div>


<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS2LR2-q7e-c2xs1tfhj7j3c7m2GIEorJSralJYjSlmXLg_ZdxVqZNrJClYcgNwYnTwxSqdkFLHHobG/pub?output=csv";

async function findProduct(){

const input = document.getElementById("productInput").value;

const response = await fetch(sheetURL);
const data = await response.text();

const rows = data.split("\n").slice(1);

for(let row of rows){

const cols = row.split(",");

const id = cols[0];
const name = cols[1];
const image = cols[2];
const link = cols[3];

if(id === input){

let platform = "Buy Product";

if(link.includes("amazon")) platform = "Click to Buy on Amazon";
if(link.includes("temu")) platform = "Click to Buy on Temu";
if(link.includes("alibaba")) platform = "Click to Buy on Alibaba";

document.getElementById("result").innerHTML =
`
<h2>${name}</h2>
<img src="${image}">
<br>
<a href="${link}" target="_blank">
<button>${platform}</button>
</a>
`;

return;

}

}

document.getElementById("result").innerHTML="Product not found";

}

</script>

</body>

</html>
