<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DreamPriceDeals</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

h1{
font-size:48px;
margin-top:40px;
}

.brand span{
color:#2ecc71;
}

.hot-title{
color:#ff3b30;
font-size:28px;
margin-top:10px;
}

.search{
margin:30px;
}

.search input{
width:300px;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:30px;
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
border-radius:10px;
}

.product-id{
color:#777;
margin-top:10px;
}

.card h3{
margin:10px 0;
}

.buy{
background:#28a745;
color:white;
padding:12px 25px;
border-radius:8px;
display:inline-block;
margin-top:10px;
text-decoration:none;
font-weight:bold;
}

.buy:hover{
background:#1e7e34;
}

.hot-section{
margin-top:30px;
}

</style>
</head>

<body>

<h1 class="brand">Dream<span>Price</span>Deals</h1>

<div class="hot-title">🔥 Today's Hot Deals</div>

<div class="search">
<input type="text" id="search" placeholder="Search by product number or name..." onkeyup="searchProduct()">
</div>

<div class="products" id="hotProducts"></div>

<div class="products" id="products"></div>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vROfbcJLOVPvFsrKq8emmhjOXfmh9EDu_G9ypUJfhenaiRgLc4ne4njzAL04Awa4MqncQSO0wTa9t35/pub?output=tsv";

let allProducts=[];

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);

let hotHTML="";
let normalHTML="";

rows.forEach(row=>{

let cols=row.split("\t");

let id=cols[0];
let name=cols[1];
let image=cols[2];
let link=cols[3];
let hot=cols[4] ? cols[4].trim().toUpperCase() : "";

let card=`
<div class="card" data-name="${name}" data-id="${id}">
<img src="${image}">
<div class="product-id">Product #${id}</div>
<h3>${name}</h3>
<a class="buy" href="${link}" target="_blank">Click To Buy</a>
</div>
`;

if(hot==="YES"){
hotHTML+=card;
}else{
normalHTML+=card;
}

});

document.getElementById("hotProducts").innerHTML=hotHTML;
document.getElementById("products").innerHTML=normalHTML;

allProducts=document.querySelectorAll(".card");

});

function searchProduct(){

let input=document.getElementById("search").value.toLowerCase();

allProducts.forEach(product=>{

let name=product.dataset.name.toLowerCase();
let id=product.dataset.id;

if(name.includes(input) || id.includes(input)){
product.style.display="block";
}else{
product.style.display="none";
}

});

}

</script>

</body>
</html>
